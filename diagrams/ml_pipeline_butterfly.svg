<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">CSE 144 transfer-learning image-classification pipeline butterfly diagram</title>
  <desc id="desc">Butterfly-style diagram showing the end-to-end 100-class image-classification pipeline: data preparation, validation, augmentation, transfer-learning models, training strategy, ensembling, test-time augmentation, and Kaggle submission.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .wing-left { fill: #e7f0ff; stroke: #5f7fb6; stroke-width: 2.5; }
      .wing-right { fill: #ecf7ef; stroke: #5c9169; stroke-width: 2.5; }
      .wing-lower-left { fill: #fff1df; stroke: #c48940; stroke-width: 2.5; }
      .wing-lower-right { fill: #f0eafd; stroke: #7b65ad; stroke-width: 2.5; }
      .body { fill: #263238; stroke: #111820; stroke-width: 3; }
      .body-light { fill: #384850; }
      .node { fill: #ffffff; stroke: #3e4a52; stroke-width: 2; }
      .node-blue { fill: #f8fbff; stroke: #5578b3; }
      .node-green { fill: #f8fff9; stroke: #548761; }
      .node-orange { fill: #fffaf3; stroke: #b5782e; }
      .node-purple { fill: #fbf8ff; stroke: #765ca9; }
      .node-dark { fill: #ffffff; stroke: #263238; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #18222a; letter-spacing: 0; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #475660; letter-spacing: 0; }
      .wing-title { font: 700 21px Arial, Helvetica, sans-serif; fill: #18222a; letter-spacing: 0; }
      .node-title { font: 700 17px Arial, Helvetica, sans-serif; fill: #1f2b33; letter-spacing: 0; }
      .node-text { font: 400 14px Arial, Helvetica, sans-serif; fill: #35454d; letter-spacing: 0; }
      .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #4b5960; letter-spacing: 0; }
      .tag { font: 700 12px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .body-text { font: 700 16px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .body-small { font: 400 12px Arial, Helvetica, sans-serif; fill: #d7e0e4; letter-spacing: 0; }
      .arrow { fill: none; stroke: #2f3b43; stroke-width: 2.2; marker-end: url(#arrowhead); }
      .arrow-soft { fill: none; stroke: #65727a; stroke-width: 1.8; marker-end: url(#arrowhead-soft); stroke-dasharray: 6 6; }
      .divider { fill: none; stroke: #c3ccd1; stroke-width: 1.5; stroke-dasharray: 5 7; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3b43"/>
    </marker>
    <marker id="arrowhead-soft" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#65727a"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#1e2a30" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect class="bg" width="1600" height="1000"/>

  <text x="800" y="58" text-anchor="middle" class="title">Transfer-Learning Image Classifier Pipeline</text>
  <text x="800" y="88" text-anchor="middle" class="subtitle">CSE 144 final project: 1,079 training images, 100 classes, 1,036 Kaggle test images</text>

  <!-- Butterfly wings -->
  <path class="wing-left" filter="url(#shadow)" d="M750 485 C590 145 210 125 120 305 C45 455 215 585 405 585 C555 585 662 545 750 485 Z"/>
  <path class="wing-lower-left" filter="url(#shadow)" d="M746 525 C600 610 505 840 300 845 C135 849 68 690 150 585 C250 457 532 508 746 525 Z"/>
  <path class="wing-right" filter="url(#shadow)" d="M850 485 C1010 145 1390 125 1480 305 C1555 455 1385 585 1195 585 C1045 585 938 545 850 485 Z"/>
  <path class="wing-lower-right" filter="url(#shadow)" d="M854 525 C1000 610 1095 840 1300 845 C1465 849 1532 690 1450 585 C1350 457 1068 508 854 525 Z"/>

  <!-- Body -->
  <ellipse class="body" cx="800" cy="470" rx="56" ry="300"/>
  <ellipse class="body-light" cx="800" cy="315" rx="41" ry="62"/>
  <path class="body" d="M776 260 C710 190 678 172 622 158" fill="none"/>
  <path class="body" d="M824 260 C890 190 922 172 978 158" fill="none"/>
  <circle cx="618" cy="157" r="9" fill="#263238"/>
  <circle cx="982" cy="157" r="9" fill="#263238"/>
  <text x="800" y="405" text-anchor="middle" class="body-text">Pipeline</text>
  <text x="800" y="430" text-anchor="middle" class="body-small">single source</text>
  <text x="800" y="448" text-anchor="middle" class="body-small">config.yaml</text>
  <line x1="770" y1="480" x2="830" y2="480" stroke="#53656e" stroke-width="2"/>
  <text x="800" y="515" text-anchor="middle" class="body-text">OOF</text>
  <text x="800" y="538" text-anchor="middle" class="body-small">selection</text>
  <text x="800" y="558" text-anchor="middle" class="body-small">and tuning</text>
  <line x1="770" y1="592" x2="830" y2="592" stroke="#53656e" stroke-width="2"/>
  <text x="800" y="632" text-anchor="middle" class="body-text">Final</text>
  <text x="800" y="655" text-anchor="middle" class="body-small">submission</text>

  <!-- Wing headings -->
  <text x="355" y="180" text-anchor="middle" class="wing-title">Data and Validation</text>
  <text x="1250" y="180" text-anchor="middle" class="wing-title">Models and Training</text>
  <text x="350" y="875" text-anchor="middle" class="wing-title">Regularization and Metrics</text>
  <text x="1250" y="875" text-anchor="middle" class="wing-title">Inference and Ensemble</text>

  <!-- Left upper: data -->
  <rect class="node node-blue" x="150" y="225" width="255" height="116" rx="8"/>
  <text x="178" y="255" class="node-title">Raw data</text>
  <text x="178" y="281" class="node-text">Data/train: folders 0-99</text>
  <text x="178" y="304" class="node-text">1,079 RGB images</text>
  <text x="178" y="327" class="node-text">4-41 images per class</text>

  <rect class="node node-blue" x="440" y="225" width="250" height="116" rx="8"/>
  <text x="468" y="255" class="node-title">Label-map gate</text>
  <text x="468" y="281" class="node-text">label = int(folder)</text>
  <text x="468" y="304" class="node-text">assert 0 -> 0 ... 99 -> 99</text>
  <text x="468" y="327" class="node-text">avoid ImageFolder order bug</text>

  <rect class="node node-blue" x="165" y="385" width="250" height="128" rx="8"/>
  <text x="193" y="415" class="node-title">Preprocessing</text>
  <text x="193" y="441" class="node-text">safe image open</text>
  <text x="193" y="464" class="node-text">convert L/RGBA/P to RGB</text>
  <text x="193" y="487" class="node-text">numeric path ordering</text>

  <rect class="node node-blue" x="455" y="385" width="245" height="128" rx="8"/>
  <text x="483" y="415" class="node-title">Stratified 5-fold CV</text>
  <text x="483" y="441" class="node-text">shuffle, seed = 1337</text>
  <text x="483" y="464" class="node-text">train/val split per fold</text>
  <text x="483" y="487" class="node-text">leak-free OOF logits</text>

  <!-- Lower left: augmentation/metrics -->
  <rect class="node node-orange" x="165" y="615" width="255" height="137" rx="8"/>
  <text x="193" y="645" class="node-title">Train transforms</text>
  <text x="193" y="671" class="node-text">timm data config</text>
  <text x="193" y="694" class="node-text">RandomResizedCrop</text>
  <text x="193" y="717" class="node-text">hflip, RandAugment, jitter</text>
  <text x="193" y="740" class="node-text">RandomErasing</text>

  <rect class="node node-orange" x="455" y="625" width="245" height="122" rx="8"/>
  <text x="483" y="655" class="node-title">Imbalance strategy</text>
  <text x="483" y="681" class="node-text">weighted sampler ablation</text>
  <text x="483" y="704" class="node-text">sqrt inverse frequency</text>
  <text x="483" y="727" class="node-text">kept off unless OOF improves</text>

  <!-- Right upper: models/training -->
  <rect class="node node-green" x="910" y="220" width="285" height="142" rx="8"/>
  <text x="938" y="250" class="node-title">Pretrained backbones</text>
  <text x="938" y="276" class="node-text">ConvNeXt-S 21k -> 1k</text>
  <text x="938" y="299" class="node-text">EfficientNetV2-S 21k -> 1k</text>
  <text x="938" y="322" class="node-text">ViT-B/16 augreg 21k -> 1k</text>
  <text x="938" y="345" class="node-text">optional EVA02 / 384 pass</text>

  <rect class="node node-green" x="1235" y="225" width="255" height="128" rx="8"/>
  <text x="1263" y="255" class="node-title">Model head</text>
  <text x="1263" y="281" class="node-text">replace classifier</text>
  <text x="1263" y="304" class="node-text">100-way output layer</text>
  <text x="1263" y="327" class="node-text">dropout = 0.2</text>

  <rect class="node node-green" x="920" y="405" width="280" height="146" rx="8"/>
  <text x="948" y="435" class="node-title">Fine-tuning recipe</text>
  <text x="948" y="461" class="node-text">AdamW, weight decay 0.05</text>
  <text x="948" y="484" class="node-text">layer-wise LR decay 0.8</text>
  <text x="948" y="507" class="node-text">warmup + cosine schedule</text>
  <text x="948" y="530" class="node-text">AMP on CUDA, grad clip 1.0</text>

  <rect class="node node-green" x="1235" y="405" width="255" height="146" rx="8"/>
  <text x="1263" y="435" class="node-title">Loss and stability</text>
  <text x="1263" y="461" class="node-text">MixUp alpha 0.2</text>
  <text x="1263" y="484" class="node-text">CutMix alpha 1.0</text>
  <text x="1263" y="507" class="node-text">label smoothing 0.1</text>
  <text x="1263" y="530" class="node-text">EMA decay 0.9998</text>

  <!-- Lower right: inference -->
  <rect class="node node-purple" x="910" y="625" width="285" height="128" rx="8"/>
  <text x="938" y="655" class="node-title">Checkpoint pool</text>
  <text x="938" y="681" class="node-text">best EMA per fold</text>
  <text x="938" y="704" class="node-text">raw fallback available</text>
  <text x="938" y="727" class="node-text">resolved config saved</text>

  <rect class="node node-purple" x="1235" y="610" width="255" height="152" rx="8"/>
  <text x="1263" y="640" class="node-title">Test inference</text>
  <text x="1263" y="666" class="node-text">load all 1,036 test IDs</text>
  <text x="1263" y="689" class="node-text">eval transforms per model</text>
  <text x="1263" y="712" class="node-text">hflip TTA</text>
  <text x="1263" y="735" class="node-text">temperature = 1.0</text>

  <rect class="node node-purple" x="1035" y="790" width="430" height="84" rx="8"/>
  <text x="1063" y="821" class="node-title">Softmax ensemble -> Kaggle CSV</text>
  <text x="1063" y="847" class="node-text">average folds x backbones x TTA, argmax labels 0-99, validate ID/Label rows</text>

  <!-- Central process nodes -->
  <rect class="node node-dark" x="675" y="130" width="250" height="86" rx="8"/>
  <text x="800" y="161" text-anchor="middle" class="node-title">Single source of truth</text>
  <text x="800" y="187" text-anchor="middle" class="node-text">config.yaml hyperparameters</text>

  <rect class="node node-dark" x="675" y="815" width="250" height="86" rx="8"/>
  <text x="800" y="846" text-anchor="middle" class="node-title">Reproducibility</text>
  <text x="800" y="872" text-anchor="middle" class="node-text">seed, logs, OOF, checkpoints</text>

  <!-- Arrows -->
  <path class="arrow" d="M405 283 L440 283"/>
  <path class="arrow" d="M565 341 C575 358 576 370 576 385"/>
  <path class="arrow" d="M415 449 L455 449"/>
  <path class="arrow" d="M700 449 C725 450 742 458 760 475"/>

  <path class="arrow" d="M925 173 C970 190 998 205 1030 220"/>
  <path class="arrow" d="M1195 291 L1235 291"/>
  <path class="arrow" d="M1058 362 C1058 378 1058 390 1058 405"/>
  <path class="arrow" d="M1200 478 L1235 478"/>
  <path class="arrow" d="M920 478 C890 478 868 480 840 490"/>

  <path class="arrow" d="M420 684 L455 684"/>
  <path class="arrow-soft" d="M578 625 C610 580 660 540 760 520"/>
  <path class="arrow" d="M840 530 C890 578 930 602 1010 625"/>
  <path class="arrow" d="M1195 690 L1235 690"/>
  <path class="arrow" d="M1362 762 C1360 786 1332 798 1292 805"/>
  <path class="arrow" d="M1035 832 C960 818 895 780 828 690"/>
  <path class="arrow-soft" d="M800 216 L800 285"/>
  <path class="arrow-soft" d="M800 690 L800 815"/>

  <!-- Labels/tags -->
  <rect x="151" y="202" width="82" height="24" rx="12" fill="#5578b3"/>
  <text x="192" y="219" text-anchor="middle" class="tag">data.py</text>
  <rect x="915" y="198" width="91" height="24" rx="12" fill="#548761"/>
  <text x="960" y="215" text-anchor="middle" class="tag">model.py</text>
  <rect x="920" y="382" width="82" height="24" rx="12" fill="#548761"/>
  <text x="961" y="399" text-anchor="middle" class="tag">train.py</text>
  <rect x="1235" y="586" width="92" height="24" rx="12" fill="#765ca9"/>
  <text x="1281" y="603" text-anchor="middle" class="tag">predict.py</text>

  <path class="divider" d="M100 590 C310 560 560 570 750 520"/>
  <path class="divider" d="M1500 590 C1290 560 1040 570 850 520"/>

  <!-- Footer note -->
  <text x="800" y="954" text-anchor="middle" class="small">Chosen final ensemble in config: convnext_small + effv2s + vit_base; all folds vote through EMA checkpoints and hflip TTA.</text>
</svg>
